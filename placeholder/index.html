<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OHSU Vista Pavilion</title>
  <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.0/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Georgia", "Times New Roman", serif;
    }

    /* ── MapLibre satellite background ── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* vignette over the map */
    #vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 75% 75% at 50% 50%,
                  transparent 25%, rgba(0,0,0,0.55) 100%);
    }

    /* ── Three.js torch canvas ── */
    #torch-canvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Bottom caption ── */
    #caption {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 4vw 5.5vh;
      text-align: left;
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
    }

    #caption .headline {
      display: block;
      font-size: clamp(1.6rem, 3.2vw, 3.4rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.9);
      line-height: 1.15;
      text-shadow: 0 2px 18px rgba(0,0,0,0.9);
    }

    #caption .sub {
      display: block;
      margin-top: 0.35em;
      font-size: clamp(1.1rem, 2vw, 2.1rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0, 202, 162, 0.9);
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }

    /* OHSU wordmark */
    #wordmark {
      position: fixed;
      top: 4vh;
      right: 4vw;
      font-size: clamp(0.75rem, 1.1vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
      z-index: 3;
    }

    /* Hide MapLibre chrome */
    .maplibregl-ctrl-logo,
    .maplibregl-ctrl-attrib,
    .maplibregl-ctrl-group { display: none !important; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="vignette"></div>
<canvas id="torch-canvas"></canvas>

<div id="caption">
  <span class="headline">Welcome to your Healing Place</span>
  <span class="sub">OHSU Vista Pavilion</span>
</div>

<div id="wordmark">OHSU</div>

<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.0/dist/maplibre-gl.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════════════
//  MapLibre – OHSU Marquam Hill orbital fly-around
// ═══════════════════════════════════════════════════════════

const OHSU_CENTER = [-122.6851, 45.4976];

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      satellite: {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        maxzoom: 19,
        attribution: '© Esri, Maxar, Earthstar Geographics',
      },
    },
    layers: [{ id: 'satellite', type: 'raster', source: 'satellite' }],
  },
  center: OHSU_CENTER,
  zoom: 15.4,
  pitch: 58,
  bearing: 0,
  interactive: false,
  attributionControl: false,
});

// ═══════════════════════════════════════════════════════════
//  Three.js – Improved torch + flame
// ═══════════════════════════════════════════════════════════

const canvas   = document.getElementById('torch-canvas');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputColorSpace  = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(38, W() / H(), 0.1, 100);
camera.position.set(0, 1.8, 9);
camera.lookAt(0, 1.2, 0);

// ── Materials ──────────────────────────────────────────────
const torchMat = new THREE.MeshStandardMaterial({
  color:     new THREE.Color(0xC09030),
  metalness: 0.90,
  roughness: 0.18,
  envMapIntensity: 1.5,
});

const gripMat = new THREE.MeshStandardMaterial({
  color:     new THREE.Color(0x7A3A18),
  metalness: 0.75,
  roughness: 0.48,
});

// ── Torch body ─────────────────────────────────────────────
const torchGroup = new THREE.Group();
scene.add(torchGroup);

// Handle
const handlePts = [
  [0.18, 0.00], [0.195, 0.30], [0.205, 0.60], [0.215, 0.90],
  [0.225, 1.20], [0.235, 1.50], [0.245, 1.80], [0.235, 2.10],
  [0.225, 2.40], [0.215, 2.70], [0.200, 2.95],
].map(([x, y]) => new THREE.Vector2(x, y));
const handle = new THREE.Mesh(new THREE.LatheGeometry(handlePts, 64), torchMat);
handle.castShadow = true;
torchGroup.add(handle);

// Grip bands
const bandGeo = new THREE.TorusGeometry(0.245, 0.030, 14, 64);
for (const y of [0.40, 0.85, 1.30, 1.75, 2.20]) {
  const band = new THREE.Mesh(bandGeo, gripMat);
  band.position.y = y;
  band.rotation.x = Math.PI / 2;
  band.castShadow = true;
  torchGroup.add(band);
}

// Bowl / cup
const bowlPts = [
  [0.200, 0.00], [0.265, 0.06], [0.360, 0.22], [0.490, 0.48],
  [0.590, 0.76], [0.630, 1.04], [0.610, 1.26], [0.545, 1.42],
  [0.440, 1.52],
].map(([x, y]) => new THREE.Vector2(x, y));
const bowl = new THREE.Mesh(new THREE.LatheGeometry(bowlPts, 64), torchMat);
bowl.position.y = 2.95;
bowl.castShadow = true;
torchGroup.add(bowl);

// Rim ring
const rim = new THREE.Mesh(new THREE.TorusGeometry(0.44, 0.038, 14, 72), gripMat);
rim.position.y = 2.95 + 1.52;
rim.rotation.x = Math.PI / 2;
rim.castShadow = true;
torchGroup.add(rim);

// ── Flame (4 layers) ───────────────────────────────────────
const FLAME_BASE_Y = 2.95 + 1.48;

// Shared profile – points from base to tip
const FLAME_PROFILE = [
  [0.00, 0.00], [0.24, 0.18], [0.33, 0.45],
  [0.34, 0.75], [0.30, 1.15], [0.19, 1.60],
  [0.07, 2.00], [0.00, 2.30],
];

function makeFlame(xScale, color, emissive, emissiveInt, opacity, side) {
  const pts = FLAME_PROFILE.map(([x, y]) => new THREE.Vector2(x * xScale, y));
  const mat = new THREE.MeshStandardMaterial({
    color:    new THREE.Color(color),
    emissive: new THREE.Color(emissive),
    emissiveIntensity: emissiveInt,
    transparent: true,
    opacity,
    depthWrite: false,
    side,
  });
  const mesh = new THREE.Mesh(new THREE.LatheGeometry(pts, 36), mat);
  mesh.position.y = FLAME_BASE_Y;
  torchGroup.add(mesh);
  return { mesh, mat };
}

// Layer 1 – wide base glow (deep red-orange, BackSide)
const fl1 = makeFlame(1.55, 0xFF2200, 0xFF1100, 1.2, 0.28, THREE.BackSide);
// Layer 2 – outer body (orange, BackSide)
const fl2 = makeFlame(1.22, 0xFF5500, 0xFF3300, 2.0, 0.50, THREE.BackSide);
// Layer 3 – main flame (orange-yellow, FrontSide)
const fl3 = makeFlame(1.00, 0xFFAA00, 0xFF8800, 3.2, 0.82, THREE.FrontSide);
// Layer 4 – hot inner core (yellow-white, FrontSide)
const fl4 = makeFlame(0.50, 0xFFFFCC, 0xFFEE55, 5.5, 0.97, THREE.FrontSide);

// Render order so transparency sorts correctly
fl1.mesh.renderOrder = 1;
fl2.mesh.renderOrder = 2;
fl3.mesh.renderOrder = 3;
fl4.mesh.renderOrder = 4;

// ── Spark particles ────────────────────────────────────────
const SPARK_COUNT = 50;
const sparkPos = new Float32Array(SPARK_COUNT * 3);

const sparkState = Array.from({ length: SPARK_COUNT }, () => ({
  life: Math.random(),
  maxLife: 0.6 + Math.random() * 1.8,
  vx: (Math.random() - 0.5) * 0.025,
  vy: 0.012 + Math.random() * 0.030,
  vz: (Math.random() - 0.5) * 0.025,
}));

// Initialise positions at flame crown
for (let i = 0; i < SPARK_COUNT; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.20;
  sparkPos[i*3]   = Math.cos(a) * r;
  sparkPos[i*3+1] = FLAME_BASE_Y + 1.4 + Math.random() * 0.6;
  sparkPos[i*3+2] = Math.sin(a) * r;
}

const sparkGeo = new THREE.BufferGeometry();
sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));

const sparkMat = new THREE.PointsMaterial({
  color: 0xFFCC44,
  size: 0.055,
  transparent: true,
  opacity: 0.95,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});

const sparks = new THREE.Points(sparkGeo, sparkMat);
sparks.renderOrder = 5;
torchGroup.add(sparks);

// ── Lighting ───────────────────────────────────────────────
// Key – warm upper-left
const keyLight = new THREE.SpotLight(0xFFF8E8, 5.0, 32, Math.PI / 6, 0.35, 1.5);
keyLight.position.set(-5, 9, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
scene.add(keyLight, keyLight.target);

// Fill – cool right
const fillLight = new THREE.DirectionalLight(0xC0D8FF, 1.2);
fillLight.position.set(5, 2, 4);
scene.add(fillLight);

// Rim – behind, above
const rimLight = new THREE.DirectionalLight(0xFFEECC, 2.4);
rimLight.position.set(-1, 7, -7);
scene.add(rimLight);

// Ground bounce
const bounceLight = new THREE.DirectionalLight(0xFFD070, 0.45);
bounceLight.position.set(0, -4, 3);
scene.add(bounceLight);

// Ambient
scene.add(new THREE.AmbientLight(0x2A3A4A, 0.65));

// Flame point lights – flicker individually
const flameLight = new THREE.PointLight(0xFF7700, 4.5, 12, 2);
flameLight.position.set(0, FLAME_BASE_Y + 1.0, 0);
scene.add(flameLight);

const flameLightTop = new THREE.PointLight(0xFFAA22, 2.2, 7, 2);
flameLightTop.position.set(0, FLAME_BASE_Y + 1.9, 0);
scene.add(flameLightTop);

// Shift whole torch down so it sits nicely in frame
torchGroup.position.y = -2.6;

// ═══════════════════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════════════════

// Multi-frequency turbulence noise for realistic flicker
function turb(t, phase = 0) {
  return (
    1.000
    + 0.070 * Math.sin(t * 0.00520 + phase)
    + 0.050 * Math.sin(t * 0.01310 + phase * 1.73)
    + 0.030 * Math.sin(t * 0.02470 + phase * 2.31)
    + 0.015 * Math.sin(t * 0.04590 + phase * 3.17)
    + 0.008 * Math.sin(t * 0.08230 + phase * 4.61)
    + 0.004 * Math.sin(t * 0.15710 + phase * 6.28)
  );
}

function updateSparks(dt) {
  const pos = sparkGeo.attributes.position;
  for (let i = 0; i < SPARK_COUNT; i++) {
    const s = sparkState[i];
    s.life += dt * 0.0008;

    if (s.life >= s.maxLife) {
      // Respawn at flame crown
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * 0.18;
      pos.array[i*3]   = Math.cos(a) * r;
      pos.array[i*3+1] = FLAME_BASE_Y + 1.1 + Math.random() * 0.4;
      pos.array[i*3+2] = Math.sin(a) * r;
      s.vx = (Math.random() - 0.5) * 0.025;
      s.vy = 0.010 + Math.random() * 0.032;
      s.vz = (Math.random() - 0.5) * 0.025;
      s.life = 0;
      s.maxLife = 0.6 + Math.random() * 1.8;
    } else {
      // Drift upward with turbulence
      s.vx += (Math.random() - 0.5) * 0.0030;
      s.vz += (Math.random() - 0.5) * 0.0030;
      s.vy -= 0.00008; // slight gravity drag
      pos.array[i*3]   += s.vx;
      pos.array[i*3+1] += s.vy;
      pos.array[i*3+2] += s.vz;
    }
  }
  pos.needsUpdate = true;
}

// ═══════════════════════════════════════════════════════════
//  Animation loop
// ═══════════════════════════════════════════════════════════
let mapBearing   = 0;
let lastT        = 0;
const MAP_ROTATE = 0.0070; // degrees per ms at 60fps ≈ 0.42°/s, full orbit ~14 min

function animate(t) {
  requestAnimationFrame(animate);
  const dt = Math.min(t - lastT, 50); // clamp dt so paused tabs don't jump
  lastT = t;

  // ── Torch rotation ──────────────────────────────────
  torchGroup.rotation.y += 0.0028;

  // ── Flame flicker ───────────────────────────────────
  const fA = turb(t, 0.0);
  const fB = turb(t, 1.6);
  const fC = turb(t, 3.1);
  const fD = turb(t, 4.8);

  fl1.mesh.scale.set(fA * 0.96, fB * 1.03, fA * 0.96);
  fl2.mesh.scale.set(fB * 0.98, fA * 1.01, fB * 0.98);
  fl3.mesh.scale.set(fC,        fA,         fC);
  fl4.mesh.scale.set(fD * 0.94, fC * 1.06, fD * 0.94);

  fl3.mat.emissiveIntensity = 3.2 * fA;
  fl4.mat.emissiveIntensity = 5.5 * fD;

  // ── Flame lights ────────────────────────────────────
  flameLight.intensity    = 4.5 * fA;
  flameLightTop.intensity = 2.2 * fC;

  // Subtle position wobble for dancing light
  flameLight.position.x    =  0.14 * Math.sin(t * 0.00210);
  flameLight.position.z    =  0.11 * Math.cos(t * 0.00330);
  flameLightTop.position.x = -0.10 * Math.sin(t * 0.00170);
  flameLightTop.position.z =  0.09 * Math.cos(t * 0.00290);

  // ── Sparks ──────────────────────────────────────────
  updateSparks(dt);

  // ── Map orbital rotation ────────────────────────────
  mapBearing += MAP_ROTATE * dt / 16.67; // normalise to 60fps
  // Vary pitch and zoom slowly for cinematic depth
  const slowSin = Math.sin(t * 0.00018);
  if (map.isStyleLoaded()) {
    map.setBearing(mapBearing % 360);
    map.setPitch(55 + 8 * slowSin);
    map.setZoom(15.2 + 0.4 * Math.sin(t * 0.00011));
  }

  renderer.render(scene, camera);
}

requestAnimationFrame(animate);

// ── Resize ──────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  map.resize();
});
</script>
</body>
</html>
